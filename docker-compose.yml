version: '3.8'

services:
  web:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CUSTOM_PORT=3000
      - DISABLE_AUTH=false
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - APP_URL=https://your-public-domain.com # Make sure to change this to your actual domain for OAuth
    volumes:
      # Persist SQLite database outside the container
      - ./data/expenses.db:/app/expenses.db
