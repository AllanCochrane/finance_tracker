version: '3.8'

services:
  web:
    build: .
    restart: always
    ports:
      - "${CUSTOM_PORT:-3000}:${CUSTOM_PORT:-3000}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/expenses.db
    volumes:
      # Persist SQLite database outside the container
      - ./data:/app/data
